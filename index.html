<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bí mật 😏</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;
    background: linear-gradient(135deg, #000000, #1e90ff);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

.container {
    text-align: center;
}

h1 {
    font-size: 40px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    margin: 10px;
    transition: 0.2s;
}

#yesBtn {
    background: #00ffcc;
}

#noBtn {
    background: red;
    position: absolute;
}

#message {
    margin-top: 30px;
    font-size: 35px;
    display: none;
}

/* pháo hoa */
.firework {
    position: absolute;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    from {transform: scale(1); opacity:1;}
    to {transform: scale(20); opacity:0;}
}
</style>

</head>

<body>

<div class="container">
    <h1>Bạn có muốn xem bí mật không? 😏</h1>
    <button id="yesBtn">Có 😎</button>
    <button id="noBtn">Không 😏</button>

    <div id="message">👉 Mày nhìn cái chó gì👈</div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// nút né chuột
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * 80 + "%";
    noBtn.style.left = Math.random() * 80 + "%";
});

// bấm có
document.getElementById("yesBtn").onclick = function() {
    document.getElementById("message").style.display = "block";
    document.getElementById("music").play();

    // pháo hoa
    for (let i = 0; i < 20; i++) {
        let fw = document.createElement("div");
        fw.className = "firework";
        fw.style.top = Math.random() * 100 + "vh";
        fw.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(fw);

        setTimeout(() => fw.remove(), 1000);
    }
};
</script>

</body>
</html>

</body>
</html>
