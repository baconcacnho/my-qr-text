<!DOCTYPE html>
<html>
<head>
    <title>Bí mật 😏</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff4e50, #1e90ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            color: white;
            overflow: hidden;
        }

        .box {
            text-align: center;
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background: white;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: yellow;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #message {
            margin-top: 20px;
            font-size: 30px;
            display: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>Bấm vào đây để xem bí mật 👀</h1>
    <button onclick="showMessage()">Bấm đi 😏</button>
    <div id="message">Nhìn cái chó gì 😳</div>
</div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
